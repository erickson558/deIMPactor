name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Read version from backend
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          text = Path('backend.py').read_text(encoding='utf-8')
          match = re.search(r'^VERSION\s*=\s*[f]?"([^"]+)"', text, re.MULTILINE)
          if not match:
              raise SystemExit('VERSION no encontrada en backend.py')
          version = match.group(1)
          if '{' in version:
              number_match = re.search(r'^VERSION_NUMBER\s*=\s*"([^"]+)"', text, re.MULTILINE)
              if not number_match:
                  raise SystemExit('VERSION_NUMBER no encontrada en backend.py')
              version = f"V{number_match.group(1)}"
          print(f"version={version}")
          with open(Path('.github_version_output'), 'w', encoding='utf-8') as fh:
              fh.write(version)
          PY
            version="$(tr -d '\r\n' < .github_version_output)"
            echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build executable
        run: |
          python -m PyInstaller .\deIMPactor.spec --noconfirm

      - name: Create or update tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag -f "$VERSION"
            git push origin ":refs/tags/$VERSION"
          else
            git tag "$VERSION"
          fi
          git push origin "$VERSION"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/deIMPactor.exe
